<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="workflow-title workflow-desc">
  <title id="workflow-title">From hotkey to share-ready capture</title>
  <desc id="workflow-desc">One binding opens the selector, writes capture artifacts, and leaves a polished card ready to paste.</desc>
  <defs>
    <linearGradient id="workflow-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1014"/>
      <stop offset="1" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="workflow-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161c"/>
      <stop offset="1" stop-color="#0f1318"/>
    </linearGradient>
    <filter id="workflow-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <marker id="workflow-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e0a45c"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="url(#workflow-bg)"/>
  <circle cx="872" cy="52" r="220" fill="#e0a45c" opacity="0.07"/>
  <circle cx="62" cy="506" r="180" fill="#e0a45c" opacity="0.04"/>
  <rect x="36" y="28" width="888" height="484" rx="20" fill="url(#workflow-card)" stroke="#2a323d" filter="url(#workflow-shadow)"/>
  <rect x="36" y="28" width="5" height="484" rx="2.5" fill="#e0a45c"/>
  <text x="72" y="67" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" font-weight="600" letter-spacing="2.4">CLOCHE WORKFLOW</text>
  <text x="72" y="96" fill="#dde3ea" font-family="Inter, ui-sans-serif, sans-serif" font-size="21" font-weight="700" letter-spacing="-0.6">From hotkey to share-ready capture</text>
  <text x="72" y="119" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11">One binding opens the selector, writes capture artifacts, and leaves a polished card ready to paste.</text>
  <text x="888" y="67" text-anchor="end" fill="#7d8590" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">Shots now · Reels next</text>
  <line x1="72" y1="139" x2="888" y2="139" stroke="#1e242c"/>
  <text x="72.0" y="164" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.7">TRIGGER</text>
  <text x="283.5" y="164" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.7">CAPTURE</text>
  <text x="495.0" y="164" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.7">PRESENT</text>
  <text x="706.5" y="164" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.7">SHARE</text>
  <line class="workflow-edge" x1="253.5" y1="230.0" x2="283.5" y2="230.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="253.5" y1="312.0" x2="283.5" y2="230.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="465.0" y1="230.0" x2="283.5" y2="312.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="465.0" y1="312.0" x2="495.0" y2="230.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="465.0" y1="312.0" x2="495.0" y2="312.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="676.5" y1="230.0" x2="706.5" y2="230.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <line class="workflow-edge" x1="676.5" y1="312.0" x2="706.5" y2="312.0" stroke="#e0a45c" stroke-width="1.5" opacity="0.9" marker-end="url(#workflow-arrow)"/>
  <rect x="72.0" y="196.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="88.0" y="225.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">desktop hotkey</text>
  <text x="88.0" y="245.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">Print · custom binding</text>
  <rect x="72.0" y="278.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="88.0" y="307.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">agent request</text>
  <text x="88.0" y="327.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">MCP or CLI</text>
  <rect x="283.5" y="196.0" width="181.5" height="68" rx="12" fill="#0f1318" stroke="#e0a45c"/>
  <text class="workflow-node-label" x="299.5" y="233.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">target picker</text>
  <text x="299.5" y="252.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">active · window · region</text>
  <text class="workflow-badge" x="299.5" y="213.0" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="8" font-weight="600" letter-spacing="1.2">HUMAN</text>
  <rect x="283.5" y="278.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="299.5" y="307.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">shot.png</text>
  <text x="299.5" y="327.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">raw frame</text>
  <rect x="495.0" y="196.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#e0a45c"/>
  <text class="workflow-node-label" x="511.0" y="225.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">polish card</text>
  <text x="511.0" y="245.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">palette · shadow · frame</text>
  <rect x="495.0" y="278.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="511.0" y="307.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">metadata.json</text>
  <text x="511.0" y="327.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">stable stdout schema</text>
  <rect x="706.5" y="196.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="722.5" y="225.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">clipboard</text>
  <text x="722.5" y="245.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">paste anywhere</text>
  <rect x="706.5" y="278.0" width="181.5" height="68" rx="12" fill="#11161c" stroke="#2a323d"/>
  <text class="workflow-node-label" x="722.5" y="307.0" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14" font-weight="600">HTML gallery</text>
  <text x="722.5" y="327.0" fill="#9aa4b2" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">recent captures</text>
  <line x1="72" y1="398" x2="888" y2="398" stroke="#1e242c"/>
  <text x="72" y="427" fill="#e0a45c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" font-weight="600" letter-spacing="1.6">SETUP CONTRACT</text>
  <text x="72" y="455" fill="#dde3ea" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="13" font-weight="600">cloche setup installs the helper, prints desktop-specific steps, and verifies capture.</text>
  <text x="72" y="478" fill="#7d8590" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10">Region capture waits for a human; tests should use non-interactive paths.</text>
</svg>

name: Feature request
description: Suggest a capability, backend, desktop, or workflow Cloche should support.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow or pain point, not just the feature. What are you trying to capture, polish, or automate?
      placeholder: |
        I want to bind a single key that captures a region and copies a polished card to my clipboard on my WM.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What command, flag, backend, or behavior would solve it? A rough sketch is fine.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Other tools, manual steps, or workarounds you are using today.
    validations:
      required: false
  - type: checkboxes
    id: contract
    attributes:
      label: Scope check
      options:
        - label: I understand a new top-level command or a change to the JSON output contract may need discussion first (see CONTRIBUTING.md).
          required: false
